    <style>
      @font-face {
        font-family: 'Cactus';
        src: url('/o-girador/fonts/Cactus%20Regular.otf') format('opentype');
        font-weight: normal;
        font-style: normal;

      /* Landing Page Styles */
      body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #0a0807; overflow-x: hidden; }
      
      #landing-page {
        position: fixed;
        inset: 0;
        background-color: #f4ecd8; /* Papier brut texturé */
        color: #1a1a1a;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 1.5rem;
        box-sizing: border-box;
        overflow-x: hidden;
        overflow-y: auto;
        transition: opacity 0.8s ease-out;
        font-family: 'Lora', serif;
      }
      
      /* Background texture simulation */
      #landing-page::before {
        content: "";
        position: absolute;
        inset: 0;
        opacity: 0.4;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
      }

      /* Top Right: Login */
      .lp-header {
        display: flex;
        justify-content: flex-end;
        position: relative;
        z-index: 2;
      }
      .lp-login {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 2px solid #1a1a1a;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        cursor: pointer;
        background: transparent;
        color: #1a1a1a;
        transition: all 0.2s;
        font-family: 'Cactus', sans-serif;
      }
      .lp-login:hover {
        background: #1a1a1a;
        color: #f4ecd8;
      }

      .lp-center {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        padding-left: clamp(1rem, 4vw, 6rem);
        gap: 2rem;
        position: relative;
        z-index: 2;
        flex: 1; /* Take middle space */
      }
      
      .lp-o-container {
        position: relative;
        width: clamp(130px, 20vw, 250px);
        height: clamp(130px, 20vw, 250px);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      
      .lp-alfaia-svg {
        position: absolute;
        width: 100%;
        height: 100%;
        animation: lp-spin 40s linear infinite;
      }
      @keyframes lp-spin { 100% { transform: rotate(360deg); } }

      .lp-entra-btn {
        position: relative;
        z-index: 10;
        background: #f4ecd8;
        border: 2px solid #1a1a1a;
        border-radius: 50%;
        width: 65%;
        height: 65%;
        font-family: 'Cactus', sans-serif;
        font-size: clamp(0.9rem, 2vw, 1.5rem);
        color: #1a1a1a;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        line-height: 1.1;
        box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        transition: all 0.3s;
      }
      .lp-entra-btn:hover {
        background: #b33939; /* Ocre / Brique */
        color: #f4ecd8;
        border-color: #b33939;
        transform: scale(1.05);
      }

      .lp-title {
        font-family: 'Cactus', sans-serif;
        font-size: clamp(4rem, 12vw, 12rem);
        line-height: 1;
        margin: 0;
        color: #1a1a1a;
        letter-spacing: -0.05em;
      }

      /* Bottom: Text & Bandeira */
      .lp-footer {
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: clamp(1rem, 3vw, 3rem);
        align-items: end;
        position: relative;
        z-index: 2;
        margin-top: -10vh;
      }

      .lp-text-container {
        display: flex;
        flex-direction: column;
        gap: clamp(1rem, 2vh, 1.5rem);
        margin-left: clamp(1rem, 4vw, 6rem);
        margin-bottom: clamp(1rem, 3vh, 2rem);
      }

      .lp-text {
        max-width: 750px;
        font-size: clamp(0.75rem, 1vw, 0.95rem);
        line-height: 1.4;
        color: #1a1a1a;
      }
      .lp-text p {
        margin-top: 0;
        margin-bottom: 0.75rem;
      }
      .lp-text p:last-child {
        margin-bottom: 0;
      }

      /* Mestre Message Box - Styled as Cordel Woodcut */
      .lp-mestre-message {
        width: clamp(200px, 25vw, 300px);
        background-color: #f4ecd8; /* Papier brut */
        border: 3px solid #1a1a1a;
        box-shadow: 6px 6px 0px #1a1a1a;
        padding: 1.5rem;
        font-family: 'Lora', serif;
        font-style: italic;
        transform: rotate(-1deg);
        margin-bottom: clamp(3rem, 12vh, 6rem);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        position: relative;
      }
      .lp-mestre-message::before {
        content: "";
        position: absolute;
        top: 4px; left: 4px; right: 4px; bottom: 4px;
        border: 1px dashed #1a1a1a;
        pointer-events: none;
        opacity: 0.3;
      }
      .lp-mestre-message:hover {
        transform: rotate(0deg) scale(1.02);
        box-shadow: 8px 8px 0px #1a1a1a;
      }
      .lp-message-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.5rem;
      }
      .lp-message-title {
        font-family: 'Cactus', sans-serif;
        font-weight: bold;
        font-style: normal;
        color: #1a1a1a;
        font-size: 1.2rem;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        border-bottom: 2px solid #1a1a1a;
        padding-bottom: 0.2rem;
        margin-bottom: 0.5rem;
        display: inline-block;
      }
      .lp-edit-btn {
        background: transparent;
        border: none;
        color: #1a1a1a;
        opacity: 0.5;
        cursor: pointer;
        padding: 4px;
        transition: opacity 0.2s, color 0.2s;
      }
      .lp-edit-btn:hover {
        opacity: 1;
        color: #8b2a1a;
      }
      .lp-message-content {
        font-size: 1rem;
        line-height: 1.5;
        color: #1a1a1a;
        white-space: pre-wrap;
      }
      .lp-textarea {
        width: 100%;
        min-height: 80px;
        background: transparent;
        border: 1px solid rgba(0,0,0,0.2);
        border-radius: 4px;
        padding: 0.5rem;
        font-family: 'Lora', serif;
        font-size: 1rem;
        resize: vertical;
        color: #1a1a1a;
        margin-bottom: 0.5rem;
      }
      .lp-textarea:focus {
        outline: none;
        border-color: #8b2a1a;
      }
      .lp-editor-actions {
        display: flex;
        gap: 0.5rem;
        justify-content: flex-end;
      }
      .lp-btn {
        display: flex;
        align-items: center;
        gap: 0.25rem;
        padding: 0.25rem 0.75rem;
        border-radius: 4px;
        font-size: 0.85rem;
        font-weight: bold;
        cursor: pointer;
        border: none;
        transition: background 0.2s;
      }
      .lp-btn-cancel {
        background: rgba(0,0,0,0.1);
        color: #1a1a1a;
      }
      .lp-btn-cancel:hover { background: rgba(0,0,0,0.2); }
      .lp-btn-save {
        background: #27ae60;
        color: #fff;
      }
      .lp-btn-save:hover { background: #219653; }

      .lp-bandeira {
        width: clamp(280px, 40vw, 450px);
        position: relative;
      }
      .lp-bandeira svg {
        width: 100%;
        height: auto;
        display: block;
        overflow: visible;
      }
      .lp-fringes {
        transform-origin: 100px 220px;
        animation: lp-wind 3s ease-in-out infinite alternate;
      }
      @keyframes lp-wind {
        0% { transform: skewX(2deg) scaleY(1); }
        100% { transform: skewX(-6deg) scaleY(1.05); }
      }
      
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0;
      }

      @media (max-width: 1024px) {
        .lp-center { flex-direction: column; text-align: center; gap: 1rem; padding-left: 0; }
        .lp-footer { grid-template-columns: 1fr; gap: 2rem; justify-items: center; margin-top: 2rem; }
        .lp-text-container { margin-left: 0; margin-bottom: 0; text-align: center; align-items: center; }
        .lp-text { text-align: center; margin-left: 0; }
        .lp-mestre-message { transform: none; width: 90%; max-width: 400px; margin-bottom: 0; margin-top: 1rem; }
        .lp-mestre-message:hover { transform: none; }
        .lp-bandeira { width: 100%; margin: 0 auto; max-width: 300px; transform: none; }
        .lp-title { font-size: 3.5rem; }
      }

    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        document.body.innerHTML = '<div style="color:red; padding: 20px; font-family: monospace; z-index: 999999; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white;">' + 
          '<h1>JS Error:</h1>' + 
          '<p>' + message + '</p>' + 
          '<pre>' + (error && error.stack ? error.stack : '') + '</pre>' + 
          '</div>';
      };
    </script>

    <script>
      window.addEventListener('error', function(event) {
        const div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.top = '0';
        div.style.left = '0';
        div.style.zIndex = '9999';
        div.style.background = 'red';
        div.style.color = 'white';
        div.style.padding = '10px';
        div.innerHTML = 'Error: ' + event.message + ' at ' + event.filename + ':' + event.lineno;
        document.body.appendChild(div);
      });
      window.addEventListener('unhandledrejection', function(event) {
        const div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.top = '0';
        div.style.right = '0';
        div.style.zIndex = '9999';
        div.style.background = 'orange';
        div.style.color = 'white';
        div.style.padding = '10px';
        div.innerHTML = 'Promise Error: ' + (event.reason && event.reason.message ? event.reason.message : event.reason);
        document.body.appendChild(div);
      });
    </script>
    <script>
      if ('serviceWorker' in navigator) {
        const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        if (isLocalhost) {
          // Unregister any active service worker on localhost to prevent dev caching issues
          navigator.serviceWorker.getRegistrations().then(registrations => {
            let unregistered = false;
            const promises = registrations.map(registration =>
              registration.unregister().then(() => {
                console.log('Service Worker unregistered on localhost');
                unregistered = true;
              })
            );
            Promise.all(promises).then(() => {
              if (unregistered) {
                // Clear caches as well to force loading fresh files
                if ('caches' in window) {
                  caches.keys().then(keys => {
                    Promise.all(keys.map(key => caches.delete(key))).then(() => {
                      window.location.reload();
                    });
                  });
                } else {
                  window.location.reload();
                }
              }
            });
          });
          // Also clear caches immediately in case
          if ('caches' in window) {
            caches.keys().then(keys => {
              keys.forEach(key => caches.delete(key));
            });
          }
        } else {
          window.addEventListener('load', () => {
            const base = window.location.pathname.startsWith('/o-girador') ? '/o-girador/' : '/';
            navigator.serviceWorker.register(base + 'sw.js')
              .then(reg => {
                console.log('Service Worker registered:', reg.scope);
                
                // If there's already a waiting worker on load, prompt the user
                if (reg.waiting) {
                  console.log('Service Worker waiting on load; prompting refresh.');
                  setTimeout(() => {
                    window.dispatchEvent(new CustomEvent('sw-update-available', { detail: reg }));
                  }, 1000);
                }

                // Detect updates to the service worker code
                reg.onupdatefound = () => {
                  const installingWorker = reg.installing;
                  if (installingWorker) {
                    installingWorker.onstatechange = () => {
                      if (installingWorker.state === 'installed') {
                        if (navigator.serviceWorker.controller) {
                          // A new service worker has been installed and is ready to activate
                          console.log('New content is available; prompting refresh.');
                          window.dispatchEvent(new CustomEvent('sw-update-available', { detail: reg }));
                        }
                      }
                    };
                  }
                };
              })
              .catch(err => console.error('Service Worker registration failed:', err));
          });
        }
      }
