    <!-- Font for Landing Page -->
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
      @font-face {
        font-family: 'Cactus';
        src: url('/fonts/Cactus Regular.otf') format('opentype');
        font-weight: normal;
        font-style: normal;
        font-display: swap;
      }
      /* Landing Page Styles */
      body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #0a0807; overflow-x: hidden; }
      
      #landing-page {
        position: fixed;
        inset: 0;
        background-color: #f4ecd8; /* Papier brut texturé */
        color: #1a1a1a;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 1.5rem;
        box-sizing: border-box;
        overflow: hidden;
        transition: opacity 0.8s ease-out;
        font-family: 'Lora', serif;
      }
      
      /* Background texture simulation */
      #landing-page::before {
        content: "";
        position: absolute;
        inset: 0;
        opacity: 0.4;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
      }

      /* Top Right: Login */
      .lp-header {
        display: flex;
        justify-content: flex-end;
        position: relative;
        z-index: 2;
      }
      .lp-login {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 2px solid #1a1a1a;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        cursor: pointer;
        background: transparent;
        color: #1a1a1a;
        transition: all 0.2s;
        font-family: 'Cactus', sans-serif;
      }
      .lp-login:hover {
        background: #1a1a1a;
        color: #f4ecd8;
      }

      .lp-center {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        padding-left: clamp(1rem, 4vw, 6rem);
        gap: 2rem;
        position: relative;
        z-index: 2;
        flex: 1; /* Take middle space */
      }
      
      .lp-o-container {
        position: relative;
        width: clamp(150px, 25vw, 300px);
        height: clamp(150px, 25vw, 300px);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      
      .lp-alfaia-svg {
        position: absolute;
        width: 100%;
        height: 100%;
        animation: lp-spin 40s linear infinite;
      }
      @keyframes lp-spin { 100% { transform: rotate(360deg); } }

      .lp-entra-btn {
        position: relative;
        z-index: 10;
        background: #f4ecd8;
        border: 2px solid #1a1a1a;
        border-radius: 50%;
        width: 65%;
        height: 65%;
        font-family: 'Cactus', sans-serif;
        font-size: clamp(1rem, 2.5vw, 1.8rem);
        color: #1a1a1a;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        line-height: 1.1;
        box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        transition: all 0.3s;
      }
      .lp-entra-btn:hover {
        background: #b33939; /* Ocre / Brique */
        color: #f4ecd8;
        border-color: #b33939;
        transform: scale(1.05);
      }

      .lp-title {
        font-family: 'Cactus', sans-serif;
        font-size: clamp(5rem, 15vw, 15rem);
        line-height: 1;
        margin: 0;
        color: #1a1a1a;
        letter-spacing: -0.05em;
      }

      /* Bottom: Text & Bandeira */
      .lp-footer {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 2rem;
        align-items: end;
        position: relative;
        z-index: 2;
        margin-top: -10vh; /* Remonte le footer pour se rapprocher de O Girador */
      }

      .lp-text {
        max-width: 700px;
        font-size: clamp(0.9rem, 1.4vw, 1.25rem);
        line-height: 1.5;
        color: #1a1a1a;
        margin-left: clamp(1rem, 4vw, 6rem);
        margin-bottom: clamp(2rem, 10vh, 5rem); /* Pousse le texte plus haut */
      }

      .lp-bandeira {
        width: clamp(280px, 40vw, 450px);
        position: relative;
      }
      .lp-bandeira svg {
        width: 100%;
        height: auto;
        display: block;
        overflow: visible;
      }
      .lp-fringes {
        transform-origin: 100px 220px;
        animation: lp-wind 3s ease-in-out infinite alternate;
      }
      @keyframes lp-wind {
        0% { transform: skewX(2deg) scaleY(1); }
        100% { transform: skewX(-6deg) scaleY(1.05); }
      }
      
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0;
      }

      @media (max-width: 1024px) {
        .lp-center { flex-direction: column; text-align: center; gap: 1rem; }
        .lp-footer { grid-template-columns: 1fr; gap: 2rem; justify-items: center; }
        .lp-text { margin-left: 0; margin-bottom: 0; text-align: center; }
        .lp-bandeira { width: 100%; margin: 0 auto; max-width: 300px; transform: none; }
        .lp-title { font-size: 4rem; }
      }

    <div id="app-container" style="width: 100%; height: 100%;">

    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        if (isLocalhost) {
          // Unregister any active service worker on localhost to prevent dev caching issues
          navigator.serviceWorker.getRegistrations().then(registrations => {
            let unregistered = false;
            const promises = registrations.map(registration =>
              registration.unregister().then(() => {
                console.log('Service Worker unregistered on localhost');
                unregistered = true;
              })
            );
            Promise.all(promises).then(() => {
              if (unregistered) {
                // Clear caches as well to force loading fresh files
                if ('caches' in window) {
                  caches.keys().then(keys => {
                    Promise.all(keys.map(key => caches.delete(key))).then(() => {
                      window.location.reload();
                    });
                  });
                } else {
                  window.location.reload();
                }
              }
            });
          });
          // Also clear caches immediately in case
          if ('caches' in window) {
            caches.keys().then(keys => {
              keys.forEach(key => caches.delete(key));
            });
          }
        } else {
          window.addEventListener('load', () => {
            const base = window.location.pathname.startsWith('/o-girador') ? '/o-girador/' : '/';
            navigator.serviceWorker.register(base + 'sw.js')
              .then(reg => {
                console.log('Service Worker registered:', reg.scope);
                
                // If there's already a waiting worker on load, prompt the user
                if (reg.waiting) {
                  console.log('Service Worker waiting on load; prompting refresh.');
                  setTimeout(() => {
                    window.dispatchEvent(new CustomEvent('sw-update-available', { detail: reg }));
                  }, 1000);
                }

                // Detect updates to the service worker code
                reg.onupdatefound = () => {
                  const installingWorker = reg.installing;
                  if (installingWorker) {
                    installingWorker.onstatechange = () => {
                      if (installingWorker.state === 'installed') {
                        if (navigator.serviceWorker.controller) {
                          // A new service worker has been installed and is ready to activate
                          console.log('New content is available; prompting refresh.');
                          window.dispatchEvent(new CustomEvent('sw-update-available', { detail: reg }));
                        }
                      }
                    };
                  }
                };
              })
              .catch(err => console.error('Service Worker registration failed:', err));
          });
        }
      }
    </script>
