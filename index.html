      @font-face {

      /* Landing Page Styles */
      body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #0a0807; }
      
      #landing-page {
        position: fixed;
        inset: 0;
        background-color: #f4ecd8; /* Papier brut texturé */
        color: #1a1a1a;
        z-index: 9999;
        display: grid;
        grid-template-rows: auto 1fr auto;
        padding: 2rem;
        box-sizing: border-box;
        transition: opacity 0.8s ease-out;
        font-family: 'Lora', serif;
      }
      
      /* Background texture simulation */
      #landing-page::before {
        content: "";
        position: absolute;
        inset: 0;
        opacity: 0.4;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
      }

      /* Top Right: Login */
      .lp-header {
        display: flex;
        justify-content: flex-end;
        position: relative;
        z-index: 2;
      }
      .lp-login {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 2px solid #1a1a1a;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        cursor: pointer;
        background: transparent;
        color: #1a1a1a;
        transition: all 0.2s;
        font-family: 'Cactus', sans-serif;
      }
      .lp-login:hover {
        background: #1a1a1a;
        color: #f4ecd8;
      }

      /* Center: Title Zone */
      .lp-center {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 2rem;
        position: relative;
        z-index: 2;
      }
      
      .lp-o-container {
        position: relative;
        width: clamp(150px, 25vw, 300px);
        height: clamp(150px, 25vw, 300px);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      
      .lp-alfaia-svg {
        position: absolute;
        width: 100%;
        height: 100%;
        animation: lp-spin 40s linear infinite;
      }
      @keyframes lp-spin { 100% { transform: rotate(360deg); } }

      .lp-entra-btn {
        position: relative;
        z-index: 10;
        background: #f4ecd8;
        border: 2px solid #1a1a1a;
        border-radius: 50%;
        width: 65%;
        height: 65%;
        font-family: 'Cactus', sans-serif;
        font-size: clamp(1rem, 2.5vw, 1.8rem);
        color: #1a1a1a;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        line-height: 1.1;
        box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        transition: all 0.3s;
      }
      .lp-entra-btn:hover {
        background: #b33939; /* Ocre / Brique */
        color: #f4ecd8;
        border-color: #b33939;
        transform: scale(1.05);
      }

      .lp-title {
        font-family: 'Cactus', sans-serif;
        font-size: clamp(5rem, 15vw, 15rem);
        line-height: 1;
        margin: 0;
        color: #1a1a1a;
        letter-spacing: -0.05em;
      }

      /* Bottom: Text & Bandeira */
      .lp-footer {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 2rem;
        align-items: end;
        position: relative;
        z-index: 2;
      }

      .lp-text {
        max-width: 650px;
        font-size: clamp(1rem, 1.6vw, 1.25rem);
        line-height: 1.6;
        color: #1a1a1a;
        margin-left: clamp(1rem, 5vw, 4rem);
        margin-bottom: clamp(1rem, 5vh, 3rem);
      }

      .lp-bandeira {
        width: clamp(250px, 30vw, 380px);
        position: relative;
      }
      .lp-bandeira svg {
        width: 100%;
        height: auto;
        display: block;
        overflow: visible;
      }
      .lp-fringes {
        transform-origin: 100px 220px;
        animation: lp-wind 3s ease-in-out infinite alternate;
      }
      @keyframes lp-wind {
        0% { transform: skewX(2deg) scaleY(1); }
        100% { transform: skewX(-6deg) scaleY(1.05); }
      }
      
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0;

        .lp-bandeira { width: 100%; margin: 0 auto; max-width: 300px; transform: none; }
        .lp-title { font-size: 4rem; }

    <!-- Landing Page Logic -->
    <script>
      (function() {
        const frText = "Le Maracatu de Baque Virado, puissante percussion brésilienne originaire de Recife (Pernambouc), s'apprend au cœur de la roda par la transmission orale des Nações. Aucune machine ne remplacera l'enseignement des mestres. O Girador a été pensé avec humilité pour s'y ajouter : c'est un carnet de notes sonore gratuit, un séquenceur interactif et une boîte à rythmes en ligne pour créer, expérimenter vos baques et entrevoir les polyrythmies secrètes entre les alfaias, la caixa, le tarol, le gonguê, l'agbê, le mineiro et les toadas, en attendant le prochain enseignement vivant.";
        const ptText = "O Maracatu de Baque Virado, poderosa percussão brasileira originária do Recife (Pernambuco), aprende-se no coração da roda pela transmissão oral das Nações. Nenhuma máquina substituirá os ensinamentos dos mestres. O Girador foi pensado com humildade para se somar a isso: é um caderno sonoro gratuito, um sequenciador interativo e uma bateria eletrônica online para criar, experimentar seus baques e vislumbrar as polirritmias secretas entre as alfaias, a caixa, o tarol, o gonguê, o agbê, o mineiro e as toadas, aguardando o próximo ensinamento vivo.";
        
        const isFr = navigator.language.startsWith('fr');
        document.getElementById('lp-desc').innerText = isFr ? frText : ptText;

        // Prefetch dummy audio
        if (window.requestIdleCallback) {
          window.requestIdleCallback(() => {
            const files = ['1_T.ogg', '1_P.ogg', '2_S.ogg'];
            files.forEach(f => {
              fetch('/Mixdown/' + f).then(r => r.arrayBuffer()).catch(()=>null);
            });
          });
        }

        const btn = document.getElementById('entra-btn');
        let audioCtx = null;
        
        btn.addEventListener('mouseenter', () => {
          if (!audioCtx) {
            try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
          }
        });

        btn.addEventListener('click', () => {
          if (audioCtx && audioCtx.state === 'suspended') {
            audioCtx.resume();
          } else if (!audioCtx) {
            try {
              audioCtx = new (window.AudioContext || window.webkitAudioContext)();
              audioCtx.resume();
            } catch(e) {}
          }

          const lp = document.getElementById('landing-page');
          const appContainer = document.getElementById('app-container');
          
          lp.style.opacity = '0';
          setTimeout(() => {
            lp.style.display = 'none';
            appContainer.style.display = 'block';
            
            requestAnimationFrame(() => {
              appContainer.style.opacity = '1';
              document.body.style.overflow = 'auto';
              document.documentElement.style.overflow = 'auto';
            });
          }, 800);
        });
      })();
    </script>

    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        if (isLocalhost) {
          // Unregister any active service worker on localhost to prevent dev caching issues
          navigator.serviceWorker.getRegistrations().then(registrations => {
            let unregistered = false;
            const promises = registrations.map(registration =>
              registration.unregister().then(() => {
                console.log('Service Worker unregistered on localhost');
                unregistered = true;
              })
            );
            Promise.all(promises).then(() => {
              if (unregistered) {
                // Clear caches as well to force loading fresh files
                if ('caches' in window) {
                  caches.keys().then(keys => {
                    Promise.all(keys.map(key => caches.delete(key))).then(() => {
                      window.location.reload();
                    });
                  });
                } else {
                  window.location.reload();
                }
              }
            });
          });
          // Also clear caches immediately in case
          if ('caches' in window) {
            caches.keys().then(keys => {
              keys.forEach(key => caches.delete(key));
            });
          }
        } else {
          window.addEventListener('load', () => {
            const base = window.location.pathname.startsWith('/o-girador') ? '/o-girador/' : '/';
            navigator.serviceWorker.register(base + 'sw.js')
              .then(reg => {
                console.log('Service Worker registered:', reg.scope);
                
                // If there's already a waiting worker on load, prompt the user
                if (reg.waiting) {
                  console.log('Service Worker waiting on load; prompting refresh.');
                  setTimeout(() => {
                    window.dispatchEvent(new CustomEvent('sw-update-available', { detail: reg }));
                  }, 1000);
                }

                // Detect updates to the service worker code
                reg.onupdatefound = () => {
                  const installingWorker = reg.installing;
                  if (installingWorker) {
                    installingWorker.onstatechange = () => {
                      if (installingWorker.state === 'installed') {
                        if (navigator.serviceWorker.controller) {
                          // A new service worker has been installed and is ready to activate
                          console.log('New content is available; prompting refresh.');
                          window.dispatchEvent(new CustomEvent('sw-update-available', { detail: reg }));
                        }
                      }
                    };
                  }
                };
              })
              .catch(err => console.error('Service Worker registration failed:', err));
          });
        }
      }
    </script>
