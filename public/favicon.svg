<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&amp;display=swap');
      
      .bg {
        fill: #0a0807; /* Très sombre, couleur de fond O Girador */
      }
      .letter-m {
        font-family: 'Cinzel Decorative', serif;
        font-size: 380px;
        font-weight: 700;
        fill: #d4c8bb; /* Blanc cassé / beige (lettre du fond) */
        text-anchor: middle;
      }
      .letter-b {
        font-family: 'Cinzel Decorative', serif;
        font-size: 420px;
        font-weight: 700;
        fill: #ffffff; /* Blanc pur (lettre de devant) */
        text-anchor: middle;
        filter: drop-shadow(6px 0px 10px rgba(0,0,0,0.9)); /* Ombre pour marquer le chevauchement */
      }
    </style>
  </defs>
  
  <!-- Fond -->
  <rect class="bg" width="512" height="512" rx="100" />
  
  <!-- Lettres -->
  <!-- M est dessiné en premier (derrière), décalé à droite -->
  <text x="320" y="410" class="letter-m">M</text>
  
  <!-- B est dessiné par dessus, décalé à gauche et plus grand -->
  <text x="180" y="430" class="letter-b">B</text>
</svg>
