<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&amp;family=Inter:wght@400;600&amp;display=swap');
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1815"/>
      <stop offset="100%" stop-color="#0a0807"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f1c40f"/>
      <stop offset="100%" stop-color="#e67e22"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Subtle drum circles -->
  <circle cx="600" cy="315" r="250" fill="none" stroke="rgba(234,221,207,0.06)" stroke-width="3" stroke-dasharray="12 6"/>
  <circle cx="600" cy="315" r="200" fill="none" stroke="rgba(241,196,15,0.08)" stroke-width="4"/>
  <circle cx="600" cy="315" r="150" fill="none" stroke="rgba(234,221,207,0.04)" stroke-width="2"/>
  <circle cx="600" cy="315" r="100" fill="none" stroke="rgba(241,196,15,0.06)" stroke-width="2" stroke-dasharray="8 4"/>
  
  <!-- Step indicators (like a sequencer) -->
  <g transform="translate(600,315)">
    <circle cx="0" cy="-250" r="8" fill="#8b0000" opacity="0.6"/>
    <circle cx="177" cy="-177" r="8" fill="#e67e22" opacity="0.6"/>
    <circle cx="250" cy="0" r="8" fill="#f1c40f" opacity="0.8"/>
    <circle cx="177" cy="177" r="8" fill="#2ecc71" opacity="0.6"/>
    <circle cx="0" cy="250" r="8" fill="#2980b9" opacity="0.6"/>
    <circle cx="-177" cy="177" r="8" fill="#8e44ad" opacity="0.6"/>
    <circle cx="-250" cy="0" r="8" fill="#e74c3c" opacity="0.6"/>
    <circle cx="-177" cy="-177" r="8" fill="#1abc9c" opacity="0.6"/>
  </g>
  
  <!-- Title -->
  <text x="600" y="260" text-anchor="middle" font-family="'Cinzel Decorative', serif" font-weight="700" font-size="90" fill="white" letter-spacing="6" style="filter:drop-shadow(0 4px 12px rgba(0,0,0,0.8))">BaqueMix</text>
  
  <!-- Subtitle line -->
  <line x1="350" y1="290" x2="850" y2="290" stroke="url(#gold)" stroke-width="2" opacity="0.6"/>
  
  <!-- Tagline -->
  <text x="600" y="340" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="600" font-size="28" fill="#f1c40f" letter-spacing="3">Sequenciador de Maracatu</text>
  
  <!-- Description -->
  <text x="600" y="390" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="400" font-size="20" fill="#eaddcf" opacity="0.7" letter-spacing="1">Crie, visualize e escute padrões rítmicos de Baque Virado</text>
  
  <!-- URL -->
  <text x="600" y="560" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="600" font-size="18" fill="#eaddcf" opacity="0.4" letter-spacing="2">julianbiblocq.github.io/BaqueMix</text>
  
  <!-- Credit -->
  <text x="600" y="600" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="400" font-size="14" fill="#eaddcf" opacity="0.25">Criado por Julian Biblocq | Arte: Toni Braga</text>
</svg>
