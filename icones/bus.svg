<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <rect width="100" height="100" fill="#000000" />
  <g fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Rounded outer frame -->
    <rect x="10" y="10" width="80" height="80" rx="15" stroke-width="6" />
    
    <!-- Fader tracks -->
    <line x1="32" y1="23" x2="32" y2="77" />
    <line x1="50" y1="23" x2="50" y2="77" />
    <line x1="68" y1="23" x2="68" y2="77" />
    
    <!-- Fader knobs (filled with black to mask the lines) -->
    <circle cx="32" cy="40" r="8.5" fill="#000000" stroke="#FFFFFF" stroke-width="5" />
    <circle cx="50" cy="60" r="8.5" fill="#000000" stroke="#FFFFFF" stroke-width="5" />
    <circle cx="68" cy="40" r="8.5" fill="#000000" stroke="#FFFFFF" stroke-width="5" />
  </g>
</svg>
